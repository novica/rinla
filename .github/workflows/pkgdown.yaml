# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  workflow_dispatch:

name: Pkgdown

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          cache-version: 1

      - name: Get package version
        id: pkg-version
        shell: bash
        run: |
          echo "version=$(grep '^Version:' DESCRIPTION | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache INLA binary
        id: cache-inla
        uses: actions/cache@v4
        with:
          path: inst/bin/linux
          key: inla-binary-linux-${{ runner.arch }}-${{ steps.pkg-version.outputs.version }}

      - name: Install INLA binary
        if: steps.cache-inla.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.pkg-version.outputs.version }}"
          ARCH=$(uname -m)
          BASE="https://inla.r-inla-download.org/Linux-builds"
          ALL_FILES=$(curl -sf "${BASE}/FILES")
          if [ "$ARCH" = "aarch64" ]; then
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep "aarch64" | head -1 || true)
          else
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep -v "aarch64" | head -1 || true)
            # Ubuntu-24.04 x86_64 is not always available; fall back to Ubuntu-22.04
            if [ -z "$FILE" ]; then
              FILE=$(echo "$ALL_FILES" | grep "Ubuntu-22.04" | grep "Version_${VERSION}" | grep -v "aarch64" | head -1 || true)
            fi
          fi
          if [ -z "$FILE" ]; then
            echo "::warning::No Linux binary found for version ${VERSION}"
            exit 0
          fi
          FILE_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1].lstrip('./'), safe='/'))" "$FILE")
          mkdir -p inst/bin/linux
          curl -Lf "${BASE}/${FILE_ENC}" | tar -xz -C inst/bin/linux/

      - name: Ensure inla.mkl exists
        shell: bash
        run: |
          if [ ! -f inst/bin/linux/64bit/inla.mkl ] && [ -f inst/bin/linux/64bit/inla.run ]; then
            cp inst/bin/linux/64bit/inla.run inst/bin/linux/64bit/inla.mkl
          fi

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Upload docs
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

  deploy:
    runs-on: ubuntu-latest
    needs: docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


