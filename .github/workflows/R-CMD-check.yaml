# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
#          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
#          - {os: ubuntu-latest,   r: 'oldrel-1'}
#          * deps::.: Can't install dependency gsl
#          * gsl: Needs R >= 4.5.0

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache-version: 1

      - name: Get package version
        id: pkg-version
        shell: bash
        run: |
          echo "version=$(grep '^Version:' DESCRIPTION | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache INLA binary (Linux)
        if: runner.os == 'Linux'
        id: cache-inla-linux
        uses: actions/cache@v5
        with:
          path: inst/bin/linux
          key: inla-binary-linux-${{ runner.arch }}-${{ steps.pkg-version.outputs.version }}

      - name: Install INLA binary (Linux)
        if: runner.os == 'Linux' && steps.cache-inla-linux.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.pkg-version.outputs.version }}"
          ARCH=$(uname -m)
          BASE="https://inla.r-inla-download.org/Linux-builds"
          ALL_FILES=$(curl -sf "${BASE}/FILES")
          if [ "$ARCH" = "aarch64" ]; then
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep "aarch64" | head -1 || true)
          else
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep -v "aarch64" | head -1 || true)
            # Ubuntu-24.04 x86_64 is not always available; fall back to Ubuntu-22.04
            if [ -z "$FILE" ]; then
              FILE=$(echo "$ALL_FILES" | grep "Ubuntu-22.04" | grep "Version_${VERSION}" | grep -v "aarch64" | head -1 || true)
            fi
          fi
          if [ -z "$FILE" ]; then
            echo "::warning::No Linux binary found for version ${VERSION}"
            exit 0
          fi
          FILE_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1].lstrip('./'), safe='/'))" "$FILE")
          mkdir -p inst/bin/linux
          curl -Lf "${BASE}/${FILE_ENC}" | tar -xz -C inst/bin/linux/

      - name: Ensure inla.mkl exists (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # inla.mkl.run is a wrapper that calls inla.mkl (the MKL binary).
          # The MKL binary is not in the standard download, so alias it to inla.run.
          if [ ! -f inst/bin/linux/64bit/inla.mkl ] && [ -f inst/bin/linux/64bit/inla.run ]; then
            cp inst/bin/linux/64bit/inla.run inst/bin/linux/64bit/inla.mkl
          fi

      - name: Cache INLA binary (macOS)
        if: runner.os == 'macOS'
        id: cache-inla-macos
        uses: actions/cache@v5
        with:
          path: |
            inst/bin/mac
            inst/bin/mac.arm64
          key: inla-binary-macos-${{ runner.arch }}-${{ steps.pkg-version.outputs.version }}

      - name: Install INLA binary (macOS)
        if: runner.os == 'macOS' && steps.cache-inla-macos.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.pkg-version.outputs.version }}"
          ARCH=$(uname -m)
          BASE="https://inla.r-inla-download.org/Mac-builds"
          PATTERN=$([ "$ARCH" = "arm64" ] && echo "arm64" || echo "x86_64")
          BIN_DIR=$([ "$ARCH" = "arm64" ] && echo "inst/bin/mac.arm64" || echo "inst/bin/mac")
          FILE=$(curl -sf "${BASE}/FILES" | grep "Version_${VERSION}" | grep "${PATTERN}" | head -1 || true)
          if [ -z "$FILE" ]; then
            echo "::warning::No macOS binary found for version ${VERSION} (${ARCH})"
            exit 0
          fi
          mkdir -p "$BIN_DIR"
          curl -Lf "${BASE}/${FILE}" | tar -xz -C "$BIN_DIR/"

      - name: Cache INLA binary (Windows)
        if: runner.os == 'Windows'
        id: cache-inla-windows
        uses: actions/cache@v5
        with:
          path: inst/bin/windows
          key: inla-binary-windows-${{ runner.arch }}-${{ steps.pkg-version.outputs.version }}

      - name: Install INLA binary (Windows)
        if: runner.os == 'Windows' && steps.cache-inla-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.pkg-version.outputs.version }}"
          $URL = "https://inla.r-inla-download.org/Windows-builds/windows64/Version_${VERSION}/64bit.zip"
          try {
            Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\inla-win.zip" -ErrorAction Stop
            New-Item -ItemType Directory -Force -Path "inst\bin\windows" | Out-Null
            Expand-Archive -Path "$env:TEMP\inla-win.zip" -DestinationPath "inst\bin\windows\" -Force
          } catch {
            Write-Warning "No Windows binary found for version ${VERSION}: $_"
          }

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          build_args: 'c("--no-build-vignettes")'
          args: 'c("--ignore-vignettes")'
