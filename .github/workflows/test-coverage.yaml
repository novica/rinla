# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  workflow_dispatch:

name: Test coverage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage
          cache-version: 1

      - name: Get package version
        id: pkg-version
        shell: bash
        run: |
          echo "version=$(grep '^Version:' DESCRIPTION | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache INLA binary
        id: cache-inla
        uses: actions/cache@v4
        with:
          path: inst/bin/linux
          key: inla-binary-linux-${{ runner.arch }}-${{ steps.pkg-version.outputs.version }}

      - name: Install INLA binary
        if: steps.cache-inla.outputs.cache-hit != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.pkg-version.outputs.version }}"
          ARCH=$(uname -m)
          BASE="https://inla.r-inla-download.org/Linux-builds"
          ALL_FILES=$(curl -sf "${BASE}/FILES")
          if [ "$ARCH" = "aarch64" ]; then
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep "aarch64" | head -1 || true)
          else
            FILE=$(echo "$ALL_FILES" | grep "Ubuntu-24.04" | grep "Version_${VERSION}" | grep -v "aarch64" | head -1 || true)
          fi
          if [ -z "$FILE" ]; then
            echo "::warning::No Linux binary found for version ${VERSION}"
            exit 0
          fi
          FILE_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe='/'))" "$FILE")
          mkdir -p inst/bin/linux
          curl -Lf "${BASE}/${FILE_ENC}" | tar -xz -C inst/bin/linux/
          if [ ! -f inst/bin/linux/64bit/inla.mkl ] && [ -f inst/bin/linux/64bit/inla.run ]; then
            cp inst/bin/linux/64bit/inla.run inst/bin/linux/64bit/inla.mkl
          fi

      - name: Test coverage
        run: |
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
